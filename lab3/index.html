<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 3</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-bottom">
        <h1>Lab 3 - Rock Paper Scissors</h1>
    </header>

    <nav>
        <ul class="nav-list">
            <li><a href="https://www.google.com" target="_blank">Google</a></li>
            <li><a href="https://www.github.com" target="_blank">GitHub</a></li>
            <li><a href="https://testudo.umd.edu" target="_blank">Testudo</a></li>
        </ul>
    </nav>

    <div class="container">
        <main class="main-content">
            <form onsubmit="return validateForm()">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>
            
                <label for="choice">Choose your move:</label><br>
                <select id="choice" name="choice">
                    <option value="rock">Rock</option>
                    <option value="paper">Paper</option>
                    <option value="scissors">Scissors</option>
                </select><br><br>
            
                <button type="submit">Play!</button>
            </form>
        </main>

        <aside class="sidebar">
            <h3>How to Play:</h3>
            <ul>
                <li>Rock beats Scissors</li>
                <li>Scissors beats Paper</li>
                <li>Paper beats Rock</li>
            </ul>
        </aside>
    </div>

    <footer class="top-bottom">
        <p>Don't forget to go outside! It's always a beautiful day somewhere</p>
    </footer>
</body>
</html>
